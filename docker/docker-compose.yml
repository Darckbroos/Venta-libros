version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: bookshop-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-bookshop}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    container_name: bookshop-backend
    environment:
      - DEBUG=${DEBUG:-True}
      - SECRET_KEY=${SECRET_KEY:-django-insecure-dev-key-change-in-production}
      - ALLOWED_HOSTS=${ALLOWED_HOSTS:-localhost,127.0.0.1,backend}
      - POSTGRES_DB=${POSTGRES_DB:-bookshop}
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - MERCADOPAGO_ACCESS_TOKEN=${MERCADOPAGO_ACCESS_TOKEN}
      - MERCADOPAGO_PUBLIC_KEY=${MERCADOPAGO_PUBLIC_KEY}
      - MERCADOPAGO_WEBHOOK_SECRET=${MERCADOPAGO_WEBHOOK_SECRET}
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:3005}
      - BACKEND_URL=${BACKEND_URL:-http://localhost:8005}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ../backend:/app
      - media_volume:/app/media
    ports:
      - "8005:8000"
    command: >
      sh -c "
      python manage.py makemigrations books orders payments &&
      python manage.py migrate --no-input &&
      python manage.py create_initial_data &&
      python manage.py runserver 0.0.0.0:8000
      "

  frontend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.frontend
    container_name: bookshop-frontend
    environment:
      - NEXT_PUBLIC_API_URL=${BACKEND_URL:-http://localhost:8005}
    depends_on:
      - backend
    ports:
      - "3005:3000"

volumes:
  postgres_data:
  media_volume:

networks:
  default:
    name: bookshop-network
